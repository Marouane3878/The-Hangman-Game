<!DOCTYPE html>
<html lang="en">
    <!-- Author: Marouane Chtitou -->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik+Spray+Paint&display=swap" rel="stylesheet">
        <title>The HangMan Game</title>
        <script src="./scripts/HangmanGame.js" defer></script>
        <script src="./scripts/functions.js" defer></script>
        <script src="./scripts/script.js" defer></script>
    </head>
    <body>
        <div id="startScreen">
            <div id="startBox">
                <h2>Save The Hanged Man</h2>
                <p>Play the guessing word game and save the hanged man before it is too late.</p>
                <button type="button" id="startButton">Play</button>
            </div>
        </div>

        <div id="wrapper">
            <header>
                <h1>Hangman Game</h1>
                <p>Guess the word to save the hanged man.</p>
            </header>

            <main>
                <section class="game-card">
                    <p><strong>Hint:</strong> <span id="hintText">Loading...</span></p>

                    <section class="crowd-background">
                        <section class="image-section">
                            <img id="hangmanImage" src="./images/hangman-0.png" alt="Hangman photo">
                        </section>
                    </section>

                    <p id="wordDisplay" class="word-display">_ _ _ _</p>

                    <p>
                        Wrong guesses:
                        <span id="wrongCount">0</span> / 6
                    </p>

                    <p>
                        Used letters:
                        <span id="usedLetters">None</span>
                    </p>

                    <p id="messageText" class="message"></p>

                    <section id="keyboard" class="keyboard">
                    </section>

                    <button type="button" id="playAgainButton">Play Again</button>
                </section>
            </main>

            <footer>
                <p>© Copyright 2026 - COMP2132</p>
            </footer>
        </div>

        <div id="resultPopup">
            <div id="resultBox">
                <h2 id="resultTitle">Game Over</h2>
                <p id="resultMessage"></p>
                <button type="button" id="popupPlayAgainButton">Play Again</button>
            </div>
        </div>
    </body>
</html>
